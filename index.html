<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Mental Panal - NIA 210</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  color: white;
  overflow-x: hidden;
}
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  min-height: 100vh;
}
header { text-align: center; margin-bottom: 16px; }
header h1 {
  font-size: 1.7em;
  margin: 0;
  font-weight: 800;
  text-shadow: 0 2px 10px rgba(0,0,0,0.4);
}
header p {
  color: rgba(255,255,255,0.7);
  margin: 4px 0 0 0;
  font-size: 0.9em;
}
.progress-bar {
  width: 100%;
  max-width: 700px;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  margin-bottom: 16px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #feca57, #ff6b6b);
  border-radius: 3px;
  transition: width 0.5s ease;
  width: 11%;
}
.step-badge {
  background: rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 6px 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15);
}
.step-badge span {
  font-weight: bold;
  font-size: 0.95em;
  color: #feca57;
}
.panal-container {
  position: relative;
  width: 700px;
  height: 520px;
  background: rgba(255,255,255,0.05);
  border-radius: 24px;
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 20px;
  overflow: hidden;
}
.info-panel {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  width: 640px;
  background: rgba(255,255,255,0.97);
  border-radius: 16px;
  padding: 18px 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  animation: slideUp 0.4s ease-out;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes pulseGlow {
  0%, 100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
  50% { filter: drop-shadow(0 0 20px rgba(255,255,255,0.6)); }
}
.hex-glow { animation: pulseGlow 2s ease-in-out infinite; }
.controls {
  display: flex;
  gap: 16px;
  align-items: center;
  margin-bottom: 12px;
}
.btn-nav {
  background: white;
  border: none;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
.btn-nav:hover:not(:disabled) { transform: scale(1.1); }
.btn-nav:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-nav svg { width: 22px; height: 22px; }
.dots {
  display: flex;
  gap: 8px;
}
.nav-dot {
  border-radius: 50%;
  transition: all 0.3s;
  cursor: pointer;
}
.nav-dot.active {
  width: 12px !important;
  height: 12px !important;
  background: #feca57 !important;
  margin-top: 0 !important;
}
.nav-dot.inactive {
  width: 10px;
  height: 10px;
  background: rgba(255,255,255,0.3);
  margin-top: 1px;
}
.hint {
  font-size: 0.7em;
  color: rgba(255,255,255,0.4);
}
.key-point {
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 8px;
  font-size: 0.85em;
  color: #444;
  animation: fadeIn 0.4s ease-out both;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.apartado-box {
  margin-top: 12px;
  padding: 8px 14px;
  background: #f0f0f0;
  border-radius: 8px;
  font-size: 0.78em;
  color: #666;
  font-weight: bold;
}
</style>
<base target="_blank">
</head>
<body>
<div class="container">
  <header>
    <h1>?? MAPA MENTAL PANAL</h1>
    <p>NIA 210 — Navega con las flechas</p>
  </header>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div class="step-badge"><span id="step-label">Paso 1 de 9</span></div>

  <div class="panal-container">
    <svg width="700" height="520" viewBox="0 0 700 520">
      <defs>
        <linearGradient id="gCenter" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#6c5ce7"/>
          <stop offset="100%" style="stop-color:#4834d4"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="shadow">
          <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.4"/>
        </filter>
      </defs>

      <!-- Inactive hexagons -->
      <g id="hex-inactive" opacity="0.2">
        <polygon points="200,80 270,120 270,200 200,240 130,200 130,120" fill="#ff6b6b" stroke="white" stroke-width="1"/>
        <polygon points="350,50 420,90 420,170 350,210 280,170 280,90" fill="#feca57" stroke="white" stroke-width="1"/>
        <polygon points="500,80 570,120 570,200 500,240 430,200 430,120" fill="#48dbfb" stroke="white" stroke-width="1"/>
        <polygon points="110,220 180,260 180,340 110,380 40,340 40,260" fill="#ff9ff3" stroke="white" stroke-width="1"/>
        <polygon points="590,220 660,260 660,340 590,380 520,340 520,260" fill="#54a0ff" stroke="white" stroke-width="1"/>
        <polygon points="200,360 270,400 270,480 200,520 130,480 130,400" fill="#1dd1a1" stroke="white" stroke-width="1"/>
        <polygon points="350,390 420,430 420,510 350,550 280,510 280,430" fill="#ff6348" stroke="white" stroke-width="1"/>
        <polygon points="500,360 570,400 570,480 500,520 430,480 430,400" fill="#5f27cd" stroke="white" stroke-width="1"/>
      </g>

      <!-- Titles on inactive hexagons -->
      <g id="titles-inactive" opacity="0.35">
        <text x="200" y="165" text-anchor="middle" fill="white" font-size="11" font-weight="bold">INTRODUCCION</text>
        <text x="350" y="140" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">OBJETIVO</text>
        <text x="500" y="165" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">DEFINICIONES</text>
        <text x="110" y="310" text-anchor="middle" fill="white" font-size="10" font-weight="bold">CONDICIONES</text>
        <text x="110" y="325" text-anchor="middle" fill="white" font-size="10" font-weight="bold">PREVIAS</text>
        <text x="590" y="310" text-anchor="middle" fill="white" font-size="10" font-weight="bold">ACUERDO DE</text>
        <text x="590" y="325" text-anchor="middle" fill="white" font-size="10" font-weight="bold">TERMINOS</text>
        <text x="200" y="445" text-anchor="middle" fill="white" font-size="10" font-weight="bold">AUDITORIAS</text>
        <text x="200" y="460" text-anchor="middle" fill="white" font-size="10" font-weight="bold">RECURRENTES</text>
        <text x="350" y="475" text-anchor="middle" fill="white" font-size="10" font-weight="bold">MODIFICACION</text>
        <text x="350" y="490" text-anchor="middle" fill="white" font-size="10" font-weight="bold">DE TERMINOS</text>
        <text x="500" y="445" text-anchor="middle" fill="white" font-size="10" font-weight="bold">CONSIDERACIONES</text>
        <text x="500" y="460" text-anchor="middle" fill="white" font-size="10" font-weight="bold">ADICIONALES</text>
      </g>

      <!-- Central hex -->
      <g filter="url(#shadow)">
        <polygon points="350,260 420,300 420,380 350,420 280,380 280,300" fill="url(#gCenter)" stroke="white" stroke-width="3" filter="url(#glow)"/>
        <text x="350" y="340" text-anchor="middle" fill="white" font-size="16" font-weight="bold">NIA 210</text>
        <text x="350" y="362" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="9">Acuerdo de los Terminos</text>
        <text x="350" y="376" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="9">del Encargo de Auditoria</text>
      </g>

      <!-- Small connectors -->
      <g opacity="0.5">
        <polygon points="290,20 310,32 310,56 290,68 270,56 270,32" fill="#feca57"/>
        <polygon points="410,20 430,32 430,56 410,68 390,56 390,32" fill="#feca57"/>
        <polygon points="70,150 90,162 90,186 70,198 50,186 50,162" fill="#feca57"/>
        <polygon points="630,150 650,162 650,186 630,198 610,186 610,162" fill="#feca57"/>
        <polygon points="290,480 310,492 310,516 290,528 270,516 270,492" fill="#feca57"/>
        <polygon points="410,480 430,492 430,516 410,528 390,516 390,492" fill="#feca57"/>
        <polygon points="160,130 180,142 180,166 160,178 140,166 140,142" fill="#feca57"/>
        <polygon points="540,130 560,142 560,166 540,178 520,166 520,142" fill="#feca57"/>
        <polygon points="160,410 180,422 180,446 160,458 140,446 140,422" fill="#feca57"/>
        <polygon points="540,410 560,422 560,446 540,458 520,446 520,422" fill="#feca57"/>
      </g>

      <!-- Connection lines -->
      <g opacity="0.3">
        <line x1="350" y1="300" x2="270" y2="170" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="350" y1="300" x2="350" y2="130" stroke="#feca57" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="350" y1="300" x2="430" y2="170" stroke="#48dbfb" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="350" y1="340" x2="160" y2="290" stroke="#ff9ff3" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="350" y1="340" x2="540" y2="290" stroke="#54a0ff" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="350" y1="380" x2="270" y2="430" stroke="#1dd1a1" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="350" y1="380" x2="350" y2="470" stroke="#ff6348" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="350" y1="380" x2="430" y2="430" stroke="#5f27cd" stroke-width="2" stroke-dasharray="5,3"/>
      </g>

      <!-- Active hexagon overlay -->
      <g id="active-hex-group" opacity="0">
        <polygon id="active-poly" points="0,0" fill="#ff6b6b" stroke="white" stroke-width="4" filter="url(#glow)"/>
        <text id="active-title" x="0" y="0" text-anchor="middle" fill="white" font-size="13" font-weight="bold"></text>
        <text id="active-subtitle" x="0" y="0" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10" font-weight="bold"></text>
      </g>
    </svg>

    <div class="info-panel" id="info-panel">
      <div id="info-content">
        <h3 style="margin: 0 0 8px 0; color: #6c5ce7; font-size: 1.1em; font-weight: 800;">Bienvenido al Mapa Mental Panal</h3>
        <p style="margin: 0; color: #555; font-size: 0.85em; line-height: 1.5;">Usa las flechas para navegar. Cada hexagono mostrara su titulo y aqui aparecera el contenido detallado.</p>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-nav" onclick="prevStep()" id="btn-prev" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="dots" id="dots"></div>
    <button class="btn-nav" onclick="nextStep()" id="btn-next">
      <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
  <div class="hint">Usa las teclas ? ? para navegar</div>
</div>

<script>
const data = [
  {
    title: "Bienvenido",
    color: "#6c5ce7",
    content: "Usa las flechas para navegar por los 8 temas de la NIA 210. Cada hexagono muestra su titulo y aqui aparece el detalle.",
    points: [],
    apartado: "",
    hex: { points: "0,0", title: "", tx: 0, ty: 0, sub: "" }
  },
  {
    title: "1. Introduccion",
    color: "#ff6b6b",
    content: "Esta NIA trata de las responsabilidades del auditor al acordar los terminos del encargo con la direccion y los responsables del gobierno de la entidad.",
    points: [
      { text: "Acordar terminos con direccion y gobierno", hl: false },
      { text: "Determinar condiciones previas a la auditoria", hl: true },
      { text: "Vigente desde el 15 de diciembre de 2009", hl: false }
    ],
    apartado: "Apartados 1-2",
    hex: { points: "200,80 270,120 270,200 200,240 130,200 130,120", title: "INTRODUCCION", tx: 200, ty: 170, sub: "" }
  },
  {
    title: "2. Objetivo",
    color: "#feca57",
    content: "Aceptar o continuar un encargo unicamente cuando se haya acordado la premisa sobre la que la auditoria se va a realizar.",
    points: [
      { text: "Determinar si concurren las condiciones previas", hl: true },
      { text: "Confirmar comprension comun entre todas las partes", hl: true },
      { text: "Acerca de los terminos del encargo", hl: false }
    ],
    apartado: "Apartado 3",
    hex: { points: "350,50 420,90 420,170 350,210 280,170 280,90", title: "OBJETIVO", tx: 350, ty: 140, sub: "" }
  },
  {
    title: "3. Definiciones",
    color: "#48dbfb",
    content: "Se definen los terminos fundamentales que rigen el acuerdo del encargo de auditoria.",
    points: [
      { text: "Condiciones previas: marco de informacion financiera aceptable", hl: true },
      { text: "Conformidad de la direccion con la premisa", hl: true },
      { text: "'Direccion' incluye responsables del gobierno", hl: false }
    ],
    apartado: "Apartados 4-5",
    hex: { points: "500,80 570,120 570,200 500,240 430,200 430,120", title: "DEFINICIONES", tx: 500, ty: 165, sub: "" }
  },
  {
    title: "4. Condiciones Previas",
    color: "#ff9ff3",
    content: "El auditor debe verificar dos aspectos fundamentales antes de aceptar el encargo.",
    points: [
      { text: "6(a): El marco de informacion financiera debe ser ACEPTABLE", hl: true },
      { text: "6(b): La direccion reconoce preparacion, control interno y acceso", hl: true },
      { text: "7: Limitacion que obligue a denegar opinion ? NO ACEPTAR", hl: false },
      { text: "8: Si no se dan ? NO ACEPTAR (salvo obligacion legal)", hl: false }
    ],
    apartado: "Apartados 6-8",
    hex: { points: "110,220 180,260 180,340 110,380 40,340 40,260", title: "CONDICIONES", tx: 110, ty: 310, sub: "PREVIAS" }
  },
  {
    title: "5. Acuerdo de Terminos",
    color: "#54a0ff",
    content: "El auditor acordara los terminos y los hara constar en carta de encargo o acuerdo escrito.",
    points: [
      { text: "9: Acordar terminos con direccion o gobierno", hl: false },
      { text: "10: Carta con objetivo, alcance, responsabilidades, marco e informe", hl: true },
      { text: "11: Si la ley prescribe todo ? confirmar reconocimiento", hl: false },
      { text: "12: Responsabilidades legales equivalentes ? usar redaccion legal", hl: false }
    ],
    apartado: "Apartados 9-12",
    hex: { points: "590,220 660,260 660,340 590,380 520,340 520,260", title: "ACUERDO DE", tx: 590, ty: 310, sub: "TERMINOS" }
  },
  {
    title: "6. Auditorias Recurrentes",
    color: "#1dd1a1",
    content: "En auditorias recurrentes, el auditor valorara si las circunstancias requieren revision de los terminos.",
    points: [
      { text: "13: Revisar terminos si hay cambios significativos", hl: true },
      { text: "Cambio en direccion, propiedad, negocio o leyes", hl: false },
      { text: "Cambio en marco contable o termino modificado", hl: false }
    ],
    apartado: "Apartado 13",
    hex: { points: "200,360 270,400 270,480 200,520 130,480 130,400", title: "AUDITORIAS", tx: 200, ty: 445, sub: "RECURRENTES" }
  },
  {
    title: "7. Modificacion de Terminos",
    color: "#ff6348",
    content: "El auditor no aceptara una modificacion sin justificacion razonable.",
    points: [
      { text: "14: NO aceptar sin justificacion razonable", hl: true },
      { text: "15: Conversion a menor seguridad ? evaluar justificacion", hl: true },
      { text: "16: Nuevos terminos por escrito", hl: false },
      { text: "17: Si no se acepta ? renunciar o informar a terceros", hl: false }
    ],
    apartado: "Apartados 14-17",
    hex: { points: "350,390 420,430 420,510 350,550 280,510 280,430", title: "MODIFICACION", tx: 350, ty: 475, sub: "DE TERMINOS" }
  },
  {
    title: "8. Consideraciones Adicionales",
    color: "#5f27cd",
    content: "Casos especiales con normas complementarias, marcos legales inaceptables e informes con formato diferente.",
    points: [
      { text: "18: Ley complementa normas ? resolver conflictos", hl: false },
      { text: "19: Marco legal inaceptable ? aceptar SOLO SI se revela info adicional", hl: true },
      { text: "20: Obligado por ley ? evaluar efecto del error", hl: false },
      { text: "21: Informe legal difiere ? si no mitigable, NO ACEPTAR", hl: true }
    ],
    apartado: "Apartados 18-21",
    hex: { points: "500,360 570,400 570,480 500,520 430,480 430,400", title: "CONSIDERACIONES", tx: 500, ty: 445, sub: "ADICIONALES" }
  }
];

let current = 0;

// Create dots
document.getElementById('dots').innerHTML = data.map((_, i) =>
  '<div class="nav-dot ' + (i === 0 ? 'active' : 'inactive') + '" onclick="goToStep(' + i + ')"></div>'
).join('');

function goToStep(n) {
  current = n;
  render();
}

function render() {
  const d = data[current];

  document.getElementById('progress').style.width = ((current / (data.length - 1)) * 100) + '%';
  document.getElementById('step-label').textContent = 'Paso ' + (current + 1) + ' de ' + data.length;
  document.getElementById('step-label').style.color = d.color;

  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === data.length - 1;

  document.querySelectorAll('.nav-dot').forEach((dot, i) => {
    dot.className = 'nav-dot ' + (i === current ? 'active' : 'inactive');
  });

  // Info panel
  const panel = document.getElementById('info-panel');
  panel.style.animation = 'none';
  panel.offsetHeight;
  panel.style.animation = 'slideUp 0.4s ease-out';

  let pointsHtml = '';
  d.points.forEach((p, i) => {
    pointsHtml += '<div class="key-point" style="background: ' + (p.hl ? d.color + '15' : '#f8f9fa') + '; border-left: 3px solid ' + (p.hl ? d.color : '#ddd') + '; animation-delay: ' + (i * 0.08) + 's;">' + (p.hl ? '? ' : '• ') + p.text + '</div>';
  });

  document.getElementById('info-content').innerHTML =
    '<h3 style="margin: 0 0 10px 0; color: ' + d.color + '; font-size: 1.15em; font-weight: 800;">' + d.title + '</h3>' +
    '<p style="margin: 0 0 14px 0; color: #555; font-size: 0.88em; line-height: 1.55;">' + d.content + '</p>' +
    pointsHtml +
    (d.apartado ? '<div class="apartado-box" style="border-left: 3px solid ' + d.color + ';">' + d.apartado + '</div>' : '');

  // Active hexagon
  const activeGroup = document.getElementById('active-hex-group');
  const activePoly = document.getElementById('active-poly');
  const activeTitle = document.getElementById('active-title');
  const activeSub = document.getElementById('active-subtitle');

  if (current > 0 && d.hex.points !== "0,0") {
    activeGroup.setAttribute('opacity', '1');
    activeGroup.setAttribute('class', 'hex-glow');
    activePoly.setAttribute('points', d.hex.points);
    activePoly.setAttribute('fill', d.color);
    activeTitle.setAttribute('x', d.hex.tx);
    activeTitle.setAttribute('y', d.hex.sub ? d.hex.ty - 6 : d.hex.ty);
    activeTitle.textContent = d.hex.title;
    activeSub.setAttribute('x', d.hex.tx);
    activeSub.setAttribute('y', d.hex.ty + 10);
    activeSub.textContent = d.hex.sub;
    activeSub.setAttribute('opacity', d.hex.sub ? '1' : '0');
  } else {
    activeGroup.setAttribute('opacity', '0');
  }
}

function nextStep() { if (current < data.length - 1) { current++; render(); } }
function prevStep() { if (current > 0) { current--; render(); } }

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
});

render();
</script>
</body>
</html>
